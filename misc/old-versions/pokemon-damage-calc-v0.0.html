<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Damage Calculator</title>
<style>
  :root {
    --bg: #0f0f14;
    --bg2: #16161e;
    --bg3: #1e1e2a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8e6f0;
    --text2: #8b89a0;
    --text3: #5a5870;
    --accent: #7c6af7;
    --accent2: #a594ff;
    --red: #e24b4a;
    --orange: #f0997b;
    --yellow: #FAC775;
    --green: #5DCAA5;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2rem;
  }

  .logo {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), #a594ff);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  h1 { font-size: 22px; font-weight: 600; color: var(--text); }
  .tagline { font-size: 13px; color: var(--text2); margin-top: 2px; }

  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    height: 190px;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  button {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: var(--bg3); }
  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

  .parsed-info {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text2);
    margin-top: 10px;
    line-height: 1.8;
    display: none;
  }
  .parsed-info b { color: var(--text); }

  .error-msg {
    font-size: 13px;
    color: var(--red);
    margin-top: 8px;
    min-height: 18px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
  }

  .defender-tag {
    font-size: 12px;
    color: var(--text2);
    background: var(--bg3);
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }

  .sort-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sort-row label { font-size: 12px; color: var(--text2); }

  select {
    font-size: 12px;
    padding: 5px 8px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg3);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text2);
  }
  .leg-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .result-row:last-child { border-bottom: none; }

  .result-name {
    width: 150px;
    flex-shrink: 0;
  }
  .result-name-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .type-badges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }

  .type-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 10px;
    text-transform: capitalize;
  }

  /* Type colors */
  .t-fire    { background:#4a1e0c; color:#EF9F27; }
  .t-water   { background:#0c2a42; color:#85B7EB; }
  .t-grass   { background:#162a08; color:#97C459; }
  .t-electric{ background:#3a2800; color:#FAC775; }
  .t-psychic { background:#3a0a1e; color:#ED93B1; }
  .t-ice     { background:#0c1e3a; color:#85B7EB; }
  .t-dragon  { background:#1a1040; color:#AFA9EC; }
  .t-dark    { background:#1a1a1a; color:#B4B2A9; }
  .t-fairy   { background:#3a0a24; color:#ED93B1; }
  .t-fighting{ background:#3a1008; color:#F0997B; }
  .t-flying  { background:#0c1e3a; color:#85B7EB; }
  .t-poison  { background:#1e0a3a; color:#AFA9EC; }
  .t-ground  { background:#3a2000; color:#FAC775; }
  .t-rock    { background:#2a2a20; color:#D3D1C7; }
  .t-bug     { background:#182808; color:#C0DD97; }
  .t-ghost   { background:#1a0a2e; color:#CECBF6; }
  .t-steel   { background:#1e1e26; color:#D3D1C7; }
  .t-normal  { background:#2a2a2a; color:#B4B2A9; }

  .bar-wrap {
    flex: 1;
    background: var(--bg3);
    border-radius: 5px;
    height: 10px;
    overflow: hidden;
    min-width: 60px;
  }
  .bar {
    height: 10px;
    border-radius: 5px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-low  { background: var(--green); }
  .bar-mid  { background: var(--yellow); }
  .bar-high { background: var(--orange); }
  .bar-ohko { background: var(--red); }

  .result-pct {
    width: 82px;
    text-align: right;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }
  .pct-ohko { color: var(--red) !important; }

  .result-move {
    width: 130px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text2);
    text-align: right;
  }
  .eff-super { color: var(--yellow); font-weight: 600; }
  .eff-resist { color: var(--green); }

  #results { display: none; }

  @media (max-width: 600px) {
    .result-move { display: none; }
    .result-name { width: 120px; }
    .result-pct { width: 65px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">⚡</div>
    <div>
      <h1>Pokémon Damage Calculator</h1>
      <div class="tagline">Paste a PokéPaste set — see which top meta attackers hit hardest</div>
    </div>
  </header>

  <div class="card">
    <div class="card-label">Your Pokémon (defender)</div>
    <textarea id="pasteInput" placeholder="Garchomp @ Rocky Helmet
Ability: Rough Skin
Level: 50
EVs: 252 HP / 4 Atk / 252 Def
Impish Nature
- Earthquake
- Dragon Tail
- Stealth Rock
- Fire Blast"></textarea>
    <div id="parseInfo" class="parsed-info"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="calculate()">Calculate damage</button>
      <button onclick="loadExample()">Load example</button>
      <button onclick="clearAll()">Clear</button>
    </div>
    <div id="parseError" class="error-msg"></div>
  </div>

  <div id="results">
    <div class="results-header">
      <div class="sort-row">
        <label>Sort by:</label>
        <select id="sortMode" onchange="renderResults()">
          <option value="damage">Highest damage</option>
          <option value="name">Name A–Z</option>
          <option value="usage">Usage rank</option>
        </select>
      </div>
      <div id="defenderTag" class="defender-tag"></div>
    </div>

    <div class="legend">
      <div class="leg-item"><div class="leg-swatch" style="background:var(--green)"></div>&lt;30% HP</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--yellow)"></div>30–60%</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--orange)"></div>60–100%</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--red)"></div>OHKO+</div>
    </div>

    <div class="card" style="padding: 0.5rem 1.25rem;">
      <div id="resultsList"></div>
    </div>
  </div>

</div>

  let e = 1;
  for (const t of defTypes) {
    const row = TYPE_CHART[moveType] || {};
    if (row[t] !== undefined) e *= row[t];
  }
  return e;
}

// ─── Stat formulae ────────────────────────────────────────────────────────────
function calcStat(base, ev=0, iv=31, level=50, nature=1) {
  return Math.floor((Math.floor((2*base + iv + Math.floor(ev/4)) * level / 100) + 5) * nature);
}
function calcHP(base, ev=0, iv=31, level=50) {
  return Math.floor((2*base + iv + Math.floor(ev/4)) * level / 100) + level + 10;
}

// ─── PokéPaste parser ─────────────────────────────────────────────────────────
function parsePaste(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) throw new Error("Empty input.");

  const m1 = lines[0].match(/^(.+?)(?:\s*@\s*(.+))?$/);
  if (!m1) throw new Error("Could not parse Pokémon name from first line.");

  let speciesRaw = m1[1].trim();
  const item = m1[2] || null;

  // Strip gender
  speciesRaw = speciesRaw.replace(/\s*\([MF]\)\s*$/, '').trim();

  let ability='', level=50, nature='hardy';
  let evs = {hp:0,atk:0,def:0,spa:0,spd:0,spe:0};
  let ivs = {hp:31,atk:31,def:31,spa:31,spd:31,spe:31};

  for (const line of lines.slice(1)) {
    if (line.startsWith('-')) continue; // moves, skip
    if (line.startsWith('Ability:'))  { ability = line.replace('Ability:','').trim(); continue; }
    if (line.startsWith('Level:'))    { level = parseInt(line.replace('Level:','').trim()) || 50; continue; }
    if (line.match(/Nature$/))        { nature = line.replace(/\s*Nature$/,'').trim().toLowerCase(); continue; }
    if (line.startsWith('EVs:')) {
      for (const p of line.replace('EVs:','').split('/')) {
        const em = p.trim().match(/(\d+)\s+(\w[\w\s]*)/);
        if (em) {
          const k = statKey(em[2].trim());
          if (k) evs[k] = parseInt(em[1]);
        }
      }
    }
    if (line.startsWith('IVs:')) {
      for (const p of line.replace('IVs:','').split('/')) {
        const im = p.trim().match(/(\d+)\s+(\w[\w\s]*)/);
        if (im) {
          const k = statKey(im[2].trim());
          if (k) ivs[k] = parseInt(im[1]);
        }
      }
    }
  }

  const key = speciesRaw.toLowerCase().replace(/[^a-z0-9]/g,'');
  const types = SPECIES_TYPES[key] || ['normal'];
  const baseStats = SPECIES_STATS[key] || {hp:80,atk:80,def:80,spa:80,spd:80,spe:80};
  const nat = NATURES[nature] || {};
  const nm = s => nat[s] || 1;

  return {
    name: speciesRaw, item, ability, level, nature, evs, ivs, types,
    stats: {
      hp:  calcHP(baseStats.hp,  evs.hp,  ivs.hp,  level),
      atk: calcStat(baseStats.atk, evs.atk, ivs.atk, level, nm('atk')),
      def: calcStat(baseStats.def, evs.def, ivs.def, level, nm('def')),
      spa: calcStat(baseStats.spa, evs.spa, ivs.spa, level, nm('spa')),
      spd: calcStat(baseStats.spd, evs.spd, ivs.spd, level, nm('spd')),
      spe: calcStat(baseStats.spe, evs.spe, ivs.spe, level, nm('spe'))
    }
  };
}

function statKey(s) {
  const map = {
    'hp':'hp','atk':'atk','def':'def','spa':'spa','spd':'spd','spe':'spe',
    'attack':'atk','defense':'def','specialattack':'spa','specialdefense':'spd',
    'speed':'spe','sp.atk':'spa','sp.def':'spd','sp. atk':'spa','sp. def':'spd'
  };
  return map[s.toLowerCase().replace(/[\s.]/g,'')] || null;
}

// ─── Damage formula (Gen 8/9, min roll = ×0.85) ───────────────────────────────
function damageFormula(level, power, atk, def, eff=1, stab=1) {
  const base = Math.floor(Math.floor(Math.floor(2 * level / 5 + 2) * power * atk / def) / 50) + 2;
  return Math.floor(base * eff * stab * 0.85); // min roll
}

// ─── Main calculation ─────────────────────────────────────────────────────────
let lastResults = [];

function calculate() {
  document.getElementById('parseError').textContent = '';
  document.getElementById('parseInfo').style.display = 'none';
  try {
    const defender = parsePaste(document.getElementById('pasteInput').value);

    document.getElementById('parseInfo').style.display = 'block';
    document.getElementById('parseInfo').innerHTML =
      `<b>${defender.name}</b> &nbsp;|&nbsp; Types: ${defender.types.join('/')} &nbsp;|&nbsp; Level ${defender.level} &nbsp;|&nbsp; ${defender.nature} nature<br>` +
      `HP: <b>${defender.stats.hp}</b> &nbsp; Def: <b>${defender.stats.def}</b> &nbsp; SpD: <b>${defender.stats.spd}</b>`;

    document.getElementById('defenderTag').textContent = 'Defending: ' + defender.name;

    lastResults = [];
    for (const attacker of META_DB) {
      let best = { dmg: 0, move: null, eff: 1 };
      for (const move of attacker.moves) {
        const eff = typeEff(move.type, defender.types);
        if (eff === 0) continue;
        const isStab = attacker.types.includes(move.type) ? 1.5 : 1;
        const atkStat = move.cat === 'physical'
          ? calcStat(attacker.atk, 252, 31, 50, 1.1)
          : calcStat(attacker.spa, 252, 31, 50, 1.1);
        const defStat = move.cat === 'physical' ? defender.stats.def : defender.stats.spd;
        const dmg = damageFormula(50, move.power, atkStat, defStat, eff, isStab);
        if (dmg > best.dmg) best = { dmg, move, eff };
      }
      const pct = best.dmg / defender.stats.hp * 100;
      lastResults.push({ attacker, dmg: best.dmg, move: best.move, pct, eff: best.eff });
    }

    renderResults();
    document.getElementById('results').style.display = 'block';
  } catch(e) {
    document.getElementById('parseError').textContent = 'Error: ' + e.message;
  }
}

function renderResults() {
  const mode = document.getElementById('sortMode').value;
  const sorted = [...lastResults];
  if (mode === 'damage')   sorted.sort((a,b) => b.pct - a.pct);
  else if (mode === 'name') sorted.sort((a,b) => a.attacker.name.localeCompare(b.attacker.name));
  else if (mode === 'usage') sorted.sort((a,b) => a.attacker.usageRank - b.attacker.usageRank);

  const maxPct = Math.min(Math.max(...sorted.map(r => r.pct), 1), 150);
  let html = '';

  for (const r of sorted) {
    const pct = r.pct;
    const barW = Math.min(pct / maxPct * 100, 100).toFixed(1);
    const barClass = pct >= 100 ? 'bar-ohko' : pct >= 60 ? 'bar-high' : pct >= 30 ? 'bar-mid' : 'bar-low';
    const pctLabel = pct >= 100
      ? `<span class="pct-ohko">${pct.toFixed(0)}% OHKO</span>`
      : `${pct.toFixed(1)}%`;
    const effLabel = r.eff > 1
      ? `<span class="eff-super">×${r.eff}</span>`
      : r.eff < 1 && r.eff > 0
      ? `<span class="eff-resist">×${r.eff}</span>`
      : '';
    const typeBadges = r.attacker.types.map(t =>
      `<span class="type-badge t-${t}">${t}</span>`).join('');
    const moveName = r.move ? r.move.name : '—';

    html += `
      <div class="result-row">
        <div class="result-name">
          <div class="result-name-text">${r.attacker.name}</div>
          <div class="type-badges">${typeBadges}</div>
        </div>
        <div class="bar-wrap">
          <div class="bar ${barClass}" style="width:${barW}%"></div>
        </div>
        <div class="result-pct">${pctLabel}</div>
        <div class="result-move">${moveName} ${effLabel}</div>
      </div>`;
  }

  document.getElementById('resultsList').innerHTML = html ||
    '<div class="error-msg" style="padding:10px 0">No moves could deal damage (all immune).</div>';
}
