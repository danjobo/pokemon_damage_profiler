<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White full circle as base -->
  <circle cx="50" cy="50" r="48" fill="white" stroke="#111" stroke-width="4"/>
  <!-- Red top half using clip -->
  <clipPath id="top">
    <rect x="0" y="0" width="100" height="50"/>
  </clipPath>
  <circle cx="50" cy="50" r="48" fill="#e74c3c" clip-path="url(#top)"/>
  <!-- Black dividing band -->
  <rect x="2" y="46" width="96" height="8" fill="#111"/>
  <!-- Outer stroke ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#111" stroke-width="4"/>
  <!-- Center button outer ring -->
  <circle cx="50" cy="50" r="16" fill="white" stroke="#111" stroke-width="5"/>
  <!-- Center button inner -->
  <circle cx="50" cy="50" r="7" fill="#ddd"/>
</svg>
